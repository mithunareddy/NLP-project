<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentiment Analysis of Social Media Comments</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #4a90e2;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .result {
      font-size: 18px;
      margin-top: 10px;
      font-weight: bold;
    }

    /* 👇 Chart size control */
    .chart-container {
      width: 300px;
      height: 300px;
      margin: auto;
    }
  </style>
</head>

<body>

<header>
  <h1>Sentiment Analysis of Social Media Comments</h1>
  <p>Analyze user comments as Positive, Negative or Neutral</p>
</header>

<div class="container">

  <div class="card">
    <h2>Enter Comment</h2>
    <textarea id="comment" placeholder="Type a social media comment..."></textarea>
    <button onclick="analyzeSentiment()">Analyze</button>
    <div class="result" id="result"></div>
  </div>

  <div class="card">
    <h2>Sentiment Overview</h2>
    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>
  </div>

</div>

<script>
  let data = {
    positive: 0,
    negative: 0,
    neutral: 0
  };

  function analyzeSentiment() {
    let text = document.getElementById("comment").value.toLowerCase();
    let resultText = "";

    if (text.includes("good") || text.includes("great") || text.includes("love")) {
      resultText = "Positive 😊";
      data.positive++;
    } 
    else if (text.includes("bad") || text.includes("hate") || text.includes("worst")) {
      resultText = "Negative 😡";
      data.negative++;
    } 
    else {
      resultText = "Neutral 😐";
      data.neutral++;
    }

    document.getElementById("result").innerText = resultText;
    updateChart();
  }

  let ctx = document.getElementById('chart').getContext('2d');

  let chart = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: ['Positive', 'Negative', 'Neutral'],
      datasets: [{
        data: [0, 0, 0]
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });

  function updateChart() {
    chart.data.datasets[0].data = [
      data.positive,
      data.negative,
      data.neutral
    ];
    chart.update();
  }
</script>

</body>
</html>
